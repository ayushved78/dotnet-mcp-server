<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.NET MCP Server — NuGet Cache</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/shared.css">
    <link rel="stylesheet" href="nuget-cache.css">
</head>
<body>
    <div class="app-layout">
        <!-- sidebar injected by layout.js -->
        <main class="main-content">

            <div class="page-header">
                <div class="page-title-group">
                    <h1 class="page-title">NuGet Cache</h1>
                    <p class="page-subtitle">Cached package metadata stored in Redis &mdash; clear to force a fresh fetch</p>
                </div>
                <div class="page-actions">
                    <div class="search-bar" id="search-bar">
                        <span class="search-icon">&#128269;</span>
                        <input type="text" class="search-input" id="pkg-search" placeholder="Filter packages..." autocomplete="off">
                        <button class="search-clear hidden" id="search-clear" title="Clear">&#10005;</button>
                    </div>
                    <button id="clear-all-btn" class="btn btn-danger hidden">&#128465; Clear All</button>
                </div>
            </div>

            <div class="stats-bar">
                <div class="stat">
                    <span class="stat-value" id="pkg-count">0</span>
                    <span class="stat-label">packages cached</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat">
                    <span class="stat-value" id="pkg-expiring-count">0</span>
                    <span class="stat-label">expiring soon (&lt;6h)</span>
                </div>
            </div>

            <div class="nuget-scroll-area">
                <div class="nuget-table" id="nuget-table-wrap">
                    <div class="nuget-table-header">
                        <span>Package</span>
                        <span>Version</span>
                        <span>Framework</span>
                        <span>Expires In</span>
                        <span></span>
                    </div>
                    <div id="pkg-list"></div>
                </div>

                <div id="empty-state" class="empty-state hidden">
                    <div class="empty-icon">&#128230;</div>
                    <p class="empty-title">No packages cached yet</p>
                    <p class="empty-hint">Package metadata is cached automatically when MCP tools first resolve a NuGet package</p>
                </div>
            </div>

        </main>
    </div>

    <script src="/shared/layout.js"></script>
    <script src="/shared/ui.js"></script>
    <script src="nuget-cache.js"></script>
</body>
</html>
